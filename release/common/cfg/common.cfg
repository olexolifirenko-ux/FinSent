######################################################################
# FinSent runtime configuration (jlaunch-style), consumed by the Perl
# launchers in release/bin (see FinSent.pm).
#
# Conventions:
#   - "key = value" with $(var) substitution (recursive, order-independent)
#   - "cond ? "a" : "b"" ternaries (cond is a $(var) holding true/false)
#   - relative paths are resolved by the launcher against release/bin
#     (the directory the launcher scripts run from)
#   - ":" separates classpath entries; the launcher absolutises each entry
#     and rejoins with the OS path separator
######################################################################
[userDefinedVariables]

# Debug build. "true"  -> run from freshly-compiled classes (IDE + Gradle
#                         output) and emit DEBUG-level console logging.
#               "false" -> run from the assembled jar in release/common/lib.
debug = "true"

# Redirect the launched JVM's stdout+stderr to <LOGS_DIR>/<process>.out instead of the
# console (appended). Intended for daemon deployments started without a console; keep
# "false" for interactive/dev runs so output is visible live. Override per-launch via the
# launcher's init(_SCRIPT_OPTIONS => { _OPT_REDIRECT_OUTPUT => ... }) or the
# _OPT_REDIRECT_OUTPUT environment variable (env > script-option > this cfg).
redirect_output = "false"

# Primary platform: selects the bundled JRE under release/common/<platform>/jre.
# $(os64) is resolved by the launcher to "win64" or "linux64" per the running
# OS (mirrors the jlaunch built-in). Pin it to "win64" / "linux64" to force one.
primary_platform = "$(os64)"

# Paths relative to release/bin:
release_path = ".."        # the release tree
project_path = "../.."     # the project root (parent of release)

# Log output directory. Exposed to the JVM as -DLOGS_DIR (absolutised by the
# launcher), referenced from cfg/system.xml as %LOGS_DIR%. Resolved against
# release/bin, so the default points at <release>/logs.
logs_path = "../logs"

# Compiled-class output: one dir per Gradle module under JavaClasses.sun/JavaClasses
# (Gradle and the Gradle-delegated IDE build both write here). Each module dir is a
# separate classpath root since the classes live under .../<module>/com/finsent/...
infra_classes   = "$(project_path)/JavaClasses.sun/JavaClasses/infra"
monitor_classes = "$(project_path)/JavaClasses.sun/JavaClasses/monitor"

# Classes placed FIRST on the classpath (highest precedence). In debug mode the
# fresh compiled output overrides the deployed jars; empty in release mode.
preferred_classes = $(debug) ? "$(infra_classes):$(monitor_classes)" : ""

# Path to the JRE/JDK, bundled per-platform in the release tree -- no
# machine-specific path. The launcher runs $(jre_path)/bin/java. Resolution
# order: this jre_path -> JAVA_HOME (env) -> "java" on PATH.
jre_path = "$(release_path)/common/$(primary_platform)/jre"

# Full classpath: preferred classes first, then the assembled runtime jars.
classpath = "$(preferred_classes):$(release_path)/common/lib/*"

# Remote JVM debugging. The actual port is debug_port_base + debug_port_offset;
# an offset of -1 disables remote debug. These are the cfg-level defaults; a
# launcher's init(_SCRIPT_OPTIONS) and the _OPT_DEBUG_PORT_OFFSET /
# _OPT_DEBUG_SUSPEND environment variables override them (env wins).
remote_debug      = $(debug) ? "true" : "false"
debug_port_base   = "9000"
debug_port_offset = "-1"
debug_suspend     = "false"

######################################################################
# [javaOptions] - one JVM option per line, applied (in order) by every
# launcher via FinSent::start(). $(var) substitution applies; -classpath /
# -cp values are resolved against release/bin and OS-joined.
######################################################################
[javaOptions]
-classpath "$(classpath)"
# HTTP protocol version for com.finsent.core.Http's shared clients (default "1.1"). HTTP/1.1 avoids the
# JDK HttpClient's HTTP/2 "too many concurrent streams" failure when overlapping fetches hit one flaky
# host (e.g. a slow feed on the fast urgent lane). Set "2" to switch back to HTTP/2 if needed. Common to
# every FinSent launcher (a JVM/HTTP-client setting, like -Djava.net.preferIPv4Stack).
-Dfinsent.httpVersion=1.1
